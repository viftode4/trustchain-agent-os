name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Check out trustchain-py (sibling dependency)
        uses: actions/checkout@v4
        with:
          repository: viftode4/trustchain-py
          path: trustchain-py
          # TODO: Pin to a tagged release (e.g., ref: v2.1.0) for stable CI
          ref: master

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install trustchain-py from source
        run: pip install -e ./trustchain-py

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check out trustchain-py (sibling dependency)
        uses: actions/checkout@v4
        with:
          repository: viftode4/trustchain-py
          path: trustchain-py
          # TODO: Pin to a tagged release (e.g., ref: v2.1.0) for stable CI
          ref: master

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install trustchain-py from source
        run: pip install -e ./trustchain-py

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Check imports
        run: python -c "import agent_os; import gateway; import tc_frameworks"
